name = "spike-status"
main = "../../src/edge-api/status/api/app.ts"

compatibility_date = "2026-03-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[dev]
port = 8792

[[d1_databases]]
binding = "STATUS_DB"
database_name = "spike-edge-analytics"
database_id = "f7219e86-7dc6-4627-92ad-17fce49ae35a"

[[services]]
binding = "SPIKE_EDGE"
service = "spike-edge"

[[services]]
binding = "TRANSPILE"
service = "esbuild"

[[services]]
binding = "MCP_REGISTRY"
service = "spike-land-mcp"

[[services]]
binding = "AUTH_MCP"
service = "mcp-auth"

[[services]]
binding = "IMAGE_STUDIO"
service = "image-studio-mcp"

[[routes]]
pattern = "status.spike.land/*"
zone_name = "spike.land"
