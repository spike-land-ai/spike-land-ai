<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" className="w-full h-full bg-gray-900 rounded-xl overflow-hidden">
  <defs>
    <style>
      @keyframes popIn {
        0% { transform: scale(0.8) translateY(20px); opacity: 0; }
        10% { transform: scale(1.05) translateY(-5px); opacity: 1; }
        15% { transform: scale(1) translateY(0); opacity: 1; }
        100% { transform: scale(1) translateY(0); opacity: 1; }
      }
      @keyframes float {
        0% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(-10px) rotate(1deg); }
        100% { transform: translateY(0px) rotate(0deg); }
      }
      @keyframes pulseRed {
        0%, 100% { filter: drop-shadow(0 0 8px rgba(239, 68, 68, 0.6)); }
        50% { filter: drop-shadow(0 0 16px rgba(239, 68, 68, 1)); }
      }
      @keyframes glitch {
        0% { transform: translate(0) }
        20% { transform: translate(-2px, 2px) }
        40% { transform: translate(-2px, -2px) }
        60% { transform: translate(2px, 2px) }
        80% { transform: translate(2px, -2px) }
        100% { transform: translate(0) }
      }
      
      .code-line { fill: #4B5563; font-family: monospace; font-size: 14px; opacity: 0.7; }
      .code-highlight { fill: #60A5FA; }
      .code-string { fill: #34D399; }
      .code-error { fill: #EF4444; text-decoration: underline wavy #EF4444; }
      
      .alert-group { opacity: 0; transform-origin: center; }
      .alert-1 { animation: popIn 4s infinite, float 6s ease-in-out infinite; animation-delay: 0.5s, 0s; }
      .alert-2 { animation: popIn 4s infinite, float 5s ease-in-out infinite; animation-delay: 1.2s, 0s; }
      .alert-3 { animation: popIn 4s infinite, float 7s ease-in-out infinite, glitch 4s infinite; animation-delay: 1.8s, 0s, 3s; }
      .alert-4 { animation: popIn 4s infinite, float 4s ease-in-out infinite; animation-delay: 2.5s, 0s; }
      .alert-box { fill: #7F1D1D; stroke: #EF4444; stroke-width: 3; animation: pulseRed 2s infinite; }
      .alert-bg { fill: rgba(0,0,0,0.8); }
    </style>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111827" />
      <stop offset="100%" stop-color="#1F2937" />
    </linearGradient>
  </defs>

  <!-- Editor Background -->
  <rect width="800" height="400" fill="url(#glow)" />
  <rect width="50" height="400" fill="#111827" />
  
  <!-- Editor Chrome -->
  <rect y="0" width="800" height="30" fill="#111827" />
  <circle cx="15" cy="15" r="5" fill="#EF4444" />
  <circle cx="35" cy="15" r="5" fill="#F59E0B" />
  <circle cx="55" cy="15" r="5" fill="#10B981" />
  <text x="400" y="20" fill="#9CA3AF" font-family="monospace" font-size="12" text-anchor="middle">checkout.ts — Pull Request #245</text>
  
  <!-- Line Numbers -->
  <g fill="#4B5563" font-family="monospace" font-size="14" text-anchor="end">
    <text x="40" y="60">1</text>
    <text x="40" y="80">2</text>
    <text x="40" y="100">3</text>
    <text x="40" y="120">4</text>
    <text x="40" y="140">5</text>
    <text x="40" y="160">6</text>
    <text x="40" y="180">7</text>
    <text x="40" y="200">8</text>
    <text x="40" y="220">9</text>
    <text x="40" y="240">10</text>
    <text x="40" y="260">11</text>
    <text x="40" y="280">12</text>
    <text x="40" y="300">13</text>
    <text x="40" y="320">14</text>
    <text x="40" y="340">15</text>
    <text x="40" y="360">16</text>
    <text x="40" y="380">17</text>
  </g>

  <!-- Dummy Code -->
  <g transform="translate(70, 0)">
    <text y="60" class="code-line"><tspan class="code-highlight">import</tspan> { getBasketData } <tspan class="code-highlight">from</tspan> <tspan class="code-string">'@server/api/basket'</tspan>;</text>
    <text y="80" class="code-line"><tspan class="code-highlight">import</tspan> { trackEvent } <tspan class="code-highlight">from</tspan> <tspan class="code-string">'@lib/analytics'</tspan>;</text>
    <text y="120" class="code-line"><tspan class="code-highlight">export async function</tspan> handleCheckout(req: Request) {</text>
    <text y="140" class="code-line">  <tspan class="code-highlight">const</tspan> url = <tspan class="code-highlight">new</tspan> URL(req.url);</text>
    <text y="160" class="code-line">  <tspan class="code-highlight">const</tspan> offerId = url.searchParams.get(<tspan class="code-string">'offer_id'</tspan>);</text>
    <text y="200" class="code-line">  <tspan fill="#6B7280">// ERROR: Unnecessary API call generated by AI</tspan></text>
    <rect x="-5" y="205" width="700" height="25" fill="#7F1D1D" opacity="0.3" rx="4" />
    <text y="220" class="code-line">  <tspan class="code-highlight">const</tspan> basket = <tspan class="code-highlight">await</tspan> <tspan class="code-error" font-weight="bold">getBasketData({ includeItems: true })</tspan>;</text>
    <text y="240" class="code-line">  </text>
    <text y="260" class="code-line">  <tspan class="code-highlight">if</tspan> (!basket) {</text>
    <text y="280" class="code-line">    <tspan class="code-highlight">return new</tspan> Response(<tspan class="code-string">'Basket not found'</tspan>, { status: <tspan class="code-highlight">404</tspan> });</text>
    <text y="300" class="code-line">  }</text>
    <text y="340" class="code-line">}</text>
  </g>

  <!-- Overlay indicating review mode -->
  <rect y="30" width="800" height="370" fill="#000" opacity="0.5" />

  <!-- Animated Alerts -->
  
  <!-- Alert 1 -->
  <g class="alert-group alert-1" transform="translate(100, 100)">
    <rect x="0" y="0" width="220" height="60" rx="8" class="alert-box" />
    <text x="110" y="38" fill="#FCA5A5" font-family="sans-serif" font-size="24" font-weight="900" text-anchor="middle" letter-spacing="2">REJECTED</text>
    <text x="210" y="20" fill="#FCA5A5" font-family="sans-serif" font-size="12" text-anchor="end">Reviewer #1</text>
  </g>

  <!-- Alert 2 -->
  <g class="alert-group alert-2" transform="translate(450, 180)">
    <rect x="0" y="0" width="280" height="80" rx="8" class="alert-box" />
    <text x="140" y="35" fill="#FCA5A5" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">CRITICAL FAILURE</text>
    <text x="140" y="60" fill="#FECACA" font-family="monospace" font-size="12" text-anchor="middle">Architecture violation detected</text>
  </g>

  <!-- Alert 3 -->
  <g class="alert-group alert-3" transform="translate(200, 240)">
    <rect x="0" y="0" width="200" height="60" rx="8" class="alert-box" transform="rotate(-5)" />
    <text x="100" y="38" fill="#FCA5A5" font-family="sans-serif" font-size="24" font-weight="900" text-anchor="middle" letter-spacing="2" transform="rotate(-5)">BLOCKED</text>
  </g>

  <!-- Alert 4 -->
  <g class="alert-group alert-4" transform="translate(380, 70)">
    <rect x="0" y="0" width="300" height="60" rx="8" fill="#991B1B" stroke="#EF4444" stroke-width="2" class="alert-box" transform="rotate(3)" />
    <text x="150" y="25" fill="#FCA5A5" font-family="sans-serif" font-size="15" font-weight="bold" text-anchor="middle" transform="rotate(3)">"Why are you calling the API here?"</text>
    <text x="290" y="45" fill="#FECACA" font-family="sans-serif" font-size="12" text-anchor="end" transform="rotate(3)">- Senior Engineer</text>
  </g>

  <!-- Scanline effect for dramatic lighting -->
  <rect y="30" width="800" height="20" fill="#EF4444" opacity="0.15">
    <animate attributeName="y" values="-20;400" dur="2.5s" repeatCount="indefinite" />
  </rect>
</svg>
