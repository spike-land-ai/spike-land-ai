  bazdmeg-mcp:
    <<: *node-service
    working_dir: /app
    command: sh -c "corepack enable && npx tsx docker/lib/mcp-http-bridge.ts src/mcp-tools/bazdmeg/mcp/index.ts 3105"
    environment:
      <<: *common-env
    expose:
      - "3105"
    labels:
      spike.subdomain: mcp-bazdmeg
      spike.port: "3105"
      spike.type: mcp
    depends_on:
      - caddy

  google-analytics-mcp:
    <<: *node-service
    working_dir: /app
    command: sh -c "corepack enable && npx tsx docker/lib/mcp-http-bridge.ts src/mcp-tools/google-analytics/mcp/index.ts 3106"
    environment:
      <<: *common-env
    expose:
      - "3106"
    labels:
      spike.subdomain: mcp-ga
