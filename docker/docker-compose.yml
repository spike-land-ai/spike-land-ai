  stripe-analytics-mcp:
    <<: *node-service
    working_dir: /app
    command: sh -c "corepack enable && npx tsx docker/lib/mcp-http-bridge.ts src/mcp-tools/stripe-analytics/mcp/index.ts 3107"
    environment:
      <<: *common-env
    expose:
      - "3107"
    labels:
      spike.subdomain: mcp-stripe
      spike.port: "3107"
      spike.type: mcp
    depends_on:
      - caddy

  # spike-cli: MCP aggregator — needs custom HTTP adapter (TODO)
  # spike-cli:
  #   <<: *node-service
  #   working_dir: /app
  #   command: sh -c "corepack enable && npx tsx src/cli/spike-cli/core-logic/cli.ts agent --port 3005"
  #   expose: ["3005"]
  #   labels:
  #     spike.subdomain: cli
  #     spike.port: "3005"
  #     spike.type: aggregator
  #   depends_on: [caddy]

  docker-compose-mcp:
    <<: *node-service
    working_dir: /app
    command: sh -c "corepack enable && npx tsx docker/lib/mcp-http-bridge.ts src/mcp-tools/docker-compose/index.ts 3200"
    environment:
      <<: *common-env
    expose:
      - "3200"
    volumes:
      - ..:/app
      - /var/run/docker.sock:/var/run/docker.sock
    labels:
      spike.subdomain: mcp-docker
      spike.port: "3200"
      spike.type: mcp
    depends_on:
      - caddy
