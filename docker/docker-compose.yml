      spike.type: mcp
    depends_on:
      - caddy

  openclaw-mcp:
    <<: *node-service
    working_dir: /app
    command: sh -c "corepack enable && npx tsx docker/lib/mcp-http-bridge.ts src/mcp-tools/openclaw/mcp/cli.ts 3104"
    environment:
